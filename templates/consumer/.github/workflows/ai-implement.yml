name: AI factory implementation

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Existing authorized issue number
        required: true
        type: string

jobs:
  implement:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.label.name == 'ai:build' }}
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
      statuses: write
    uses: shanchaudary/shans-ai-software-factory/.github/workflows/reusable-implement.yml@REPLACE_WITH_FULL_FACTORY_COMMIT_SHA
    with:
      issue_number: ${{ github.event_name == 'workflow_dispatch' && fromJSON(inputs.issue_number) || github.event.issue.number }}
      factory_ref: REPLACE_WITH_FULL_FACTORY_COMMIT_SHA
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
